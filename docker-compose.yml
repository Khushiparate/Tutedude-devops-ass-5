version: '3.8'

services:
  backend:
    build: ./backend
    container_name: flask_backend
    ports:
      - "5000:5000"
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: node_frontend
    ports:
      - "3000:3000"
    environment:
      - FLASK_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
